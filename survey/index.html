<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Guided physical-security site survey tool: geotagged photos and video, guard posts, CCTV, access control, comms, and one-tap Word/PowerPoint/HTML reports. Offline-first; data stays on device." />
  <meta name="theme-color" content="#0d0d0d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="robots" content="noindex" />
  <title>Site Survey — CharoAI</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/survey.css" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="app-header">
    <button class="icon-btn" id="btn-home" title="Surveys">☰</button>
    <h1 class="app-title">SITE SURVEY</h1>
    <span class="hdr-survey-name" id="hdr-survey-name"></span>
    <span class="spacer"></span>
    <span id="hdr-status" class="row" style="gap:0.35rem"></span>
    <button class="icon-btn" id="btn-settings" title="Settings">⚙</button>
  </header>

  <main id="view"></main>

  <nav class="tabbar" id="tabbar" style="display:none">
    <button data-tab="guide"><span class="glyph">🧭</span>Guide</button>
    <button data-tab="survey"><span class="glyph">📋</span>Survey</button>
    <button data-tab="capture"><span class="glyph">📸</span>Capture</button>
    <button data-tab="map"><span class="glyph">🗺️</span>Map</button>
    <button data-tab="export"><span class="glyph">📤</span>Export</button>
  </nav>

  <div id="toast-holder"></div>

  <script src="js/util.js"></script>
  <script src="js/db.js"></script>
  <script src="js/schema.js"></script>
  <script src="js/sensors.js"></script>
  <script src="js/camera.js"></script>
  <script src="js/forms.js"></script>
  <script src="js/siteplot.js"></script>
  <script src="js/guide.js"></script>
  <script src="js/export.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
